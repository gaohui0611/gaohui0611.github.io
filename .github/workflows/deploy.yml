# 自动部署 Hexo 博客到 GitHub Pages
# 当你推送代码到 main 分支时，自动触发构建和部署

name: Deploy Blog

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 缓存依赖以加速构建
      - name: Cache dependencies
        uses: actions/cache@v4
        id: cache
        with:
          path: |
            node_modules
            themes/matery
          key: ${{ runner.os }}-hexo-${{ hashFiles('**/package-lock.json') }}

      # 4. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 5. 安装 Matery 主题（如果缓存未命中）
      - name: Install Matery Theme
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/blinkfox/hexo-theme-matery.git themes/matery
          rm -rf themes/matery/.git themes/matery/.github

      # 6. 生成静态文件
      - name: Generate static files
        run: npx hexo generate

      # 6.5 移除可能触发 GitHub Push Protection 的文件
      - name: Remove twikoo library
        run: rm -rf public/libs/twikoo

      # 7. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
